<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas-IA Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #0a1628;
            color: #f0f0f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(13, 59, 102, 0.8);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-bottom: 2px solid #4db8ff;
        }

        header h1 {
            font-size: 28px;
            color: #4db8ff;
        }

        .nav {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .nav button {
            padding: 10px 15px;
            background: #4db8ff;
            color: #0a1628;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav button:hover {
            background: #66d9ff;
        }

        .nav button.active {
            background: #00ff99;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 30, 30, 0.8);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #4db8ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card h3 {
            color: #4db8ff;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff99;
        }

        .section {
            background: rgba(30, 30, 30, 0.8);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .section.active {
            display: block;
        }

        .section h2 {
            color: #4db8ff;
            margin-bottom: 20px;
            font-size: 22px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th {
            background: rgba(77, 184, 255, 0.1);
            padding: 12px;
            text-align: left;
            color: #4db8ff;
            border-bottom: 2px solid #4db8ff;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        table tr:hover {
            background: rgba(77, 184, 255, 0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #4db8ff;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #4db8ff;
            color: #f0f0f0;
            border-radius: 4px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00ff99;
            box-shadow: 0 0 10px rgba(0,255,153,0.3);
        }

        .btn {
            padding: 10px 20px;
            background: #4db8ff;
            color: #0a1628;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00ff99;
        }

        .btn.danger {
            background: #ff4db8;
        }

        .btn.danger:hover {
            background: #ff66cc;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status.paid {
            background: rgba(0, 255, 153, 0.2);
            color: #00ff99;
        }

        .status.draft {
            background: rgba(77, 184, 255, 0.2);
            color: #4db8ff;
        }

        .status.sent {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status.overdue {
            background: rgba(255, 77, 184, 0.2);
            color: #ff4db8;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(30, 30, 30, 0.8);
            padding: 30px;
            border-radius: 8px;
            border: 2px solid #4db8ff;
        }

        .login-container h1 {
            color: #4db8ff;
            margin-bottom: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="login-screen" class="login-container" style="display: none;">
        <h1>Atlas-IA Admin</h1>
        <div class="form-group">
            <label>Mot de passe admin:</label>
            <input type="password" id="admin-password" placeholder="Entrez votre mot de passe">
        </div>
        <button class="btn" onclick="login()" style="width: 100%;">Se connecter</button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="container">
            <header>
                <h1>📊 Atlas-IA Admin Dashboard</h1>
                <div class="nav">
                    <button class="nav-btn active" onclick="switchTab('dashboard')">Dashboard</button>
                    <button class="nav-btn" onclick="switchTab('clients')">Clients</button>
                    <button class="nav-btn" onclick="switchTab('invoices')">Factures</button>
                    <button class="nav-btn" onclick="switchTab('products')">Produits</button>
                    <button class="nav-btn" onclick="logout()">Déconnexion</button>
                </div>
            </header>

            <!-- DASHBOARD -->
            <div id="dashboard" class="section active">
                <h2>Vue d'ensemble</h2>
                <div class="dashboard">
                    <div class="card">
                        <h3>Revenu Total</h3>
                        <div class="value" id="total-revenue">€0</div>
                    </div>
                    <div class="card">
                        <h3>Revenu Payé</h3>
                        <div class="value" id="paid-revenue">€0</div>
                    </div>
                    <div class="card">
                        <h3>En attente</h3>
                        <div class="value" id="pending-revenue">€0</div>
                    </div>
                    <div class="card">
                        <h3>Total Factures</h3>
                        <div class="value" id="total-invoices">0</div>
                    </div>
                </div>
                <button class="btn" onclick="loadAnalytics()">Rafraîchir</button>
            </div>

            <!-- CLIENTS -->
            <div id="clients" class="section">
                <h2>Gestion des Clients</h2>
                <div style="margin-bottom: 20px;">
                    <button class="btn" onclick="showClientForm()">+ Nouveau Client</button>
                </div>
                <div id="client-form" style="display: none; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 4px;">
                    <div class="form-group">
                        <label>Nom:</label>
                        <input type="text" id="client-name" placeholder="Nom complet">
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="client-email" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>Téléphone:</label>
                        <input type="text" id="client-phone">
                    </div>
                    <div class="form-group">
                        <label>Adresse:</label>
                        <input type="text" id="client-address">
                    </div>
                    <button class="btn" onclick="saveClient()">Créer Client</button>
                    <button class="btn" onclick="hideClientForm()" style="background: #666;">Annuler</button>
                </div>
                <table id="clients-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Téléphone</th>
                            <th>Statut</th>
                            <th>Créé</th>
                        </tr>
                    </thead>
                    <tbody id="clients-body"></tbody>
                </table>
            </div>

            <!-- INVOICES -->
            <div id="invoices" class="section">
                <h2>Factures</h2>
                <div style="margin-bottom: 20px;">
                    <button class="btn" onclick="showInvoiceForm()">+ Nouvelle Facture</button>
                </div>
                <table id="invoices-table">
                    <thead>
                        <tr>
                            <th>Numéro</th>
                            <th>Client</th>
                            <th>Montant</th>
                            <th>Statut</th>
                            <th>Créée</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="invoices-body"></tbody>
                </table>
            </div>

            <!-- PRODUCTS -->
            <div id="products" class="section">
                <h2>Produits</h2>
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>Nom</th>
                            <th>SKU</th>
                            <th>Prix</th>
                            <th>Coût</th>
                            <th>Marge</th>
                        </tr>
                    </thead>
                    <tbody id="products-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('atlas-ia-token');

        function init() {
            if (token) {
                showMainApp();
                loadAnalytics();
                loadClients();
                loadInvoices();
                loadProducts();
            } else {
                showLoginScreen();
            }
        }

        function showLoginScreen() {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }

        function showMainApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        async function login() {
            const password = document.getElementById('admin-password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (!response.ok) throw new Error('Invalid password');

                const data = await response.json();
                token = data.token;
                localStorage.setItem('atlas-ia-token', token);
                showMainApp();
                loadAnalytics();
                loadClients();
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        function logout() {
            localStorage.removeItem('atlas-ia-token');
            token = null;
            showLoginScreen();
        }

        function switchTab(tab) {
            // Hide all sections
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

            // Show selected
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadAnalytics() {
            try {
                const response = await fetch('/api/analytics', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                document.getElementById('total-revenue').textContent = '€' + data.totalRevenue.toFixed(2);
                document.getElementById('paid-revenue').textContent = '€' + data.paidRevenue.toFixed(2);
                document.getElementById('pending-revenue').textContent = '€' + data.pendingRevenue.toFixed(2);
                document.getElementById('total-invoices').textContent = data.totalInvoices;
            } catch (error) {
                console.error(error);
            }
        }

        async function loadClients() {
            try {
                const response = await fetch('/api/clients', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const clients = await response.json();

                const tbody = document.getElementById('clients-body');
                tbody.innerHTML = clients.map(c => `
                    <tr>
                        <td>${c.name}</td>
                        <td>${c.email}</td>
                        <td>${c.phone || '-'}</td>
                        <td><span class="status ${c.status}">${c.status}</span></td>
                        <td>${new Date(c.created_at).toLocaleDateString('fr-FR')}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        async function loadInvoices() {
            try {
                const response = await fetch('/api/invoices', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const invoices = await response.json();

                const tbody = document.getElementById('invoices-body');
                tbody.innerHTML = invoices.map(inv => `
                    <tr>
                        <td>${inv.invoice_number}</td>
                        <td>${inv.clients?.name || 'N/A'}</td>
                        <td>€${inv.total.toFixed(2)}</td>
                        <td><span class="status ${inv.status}">${inv.status}</span></td>
                        <td>${new Date(inv.created_at).toLocaleDateString('fr-FR')}</td>
                        <td>
                            <button class="btn" onclick="markAsPaid('${inv.id}')">Marquer Payée</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();

                const tbody = document.getElementById('products-body');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.sku}</td>
                        <td>€${p.price.toFixed(2)}</td>
                        <td>€${p.cost.toFixed(2)}</td>
                        <td>${p.margin}%</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        function showClientForm() {
            document.getElementById('client-form').style.display = 'block';
        }

        function hideClientForm() {
            document.getElementById('client-form').style.display = 'none';
        }

        async function saveClient() {
            const client = {
                name: document.getElementById('client-name').value,
                email: document.getElementById('client-email').value,
                phone: document.getElementById('client-phone').value,
                address: document.getElementById('client-address').value,
                status: 'prospect'
            };

            try {
                const response = await fetch('/api/clients', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(client)
                });

                if (response.ok) {
                    alert('✅ Client créé!');
                    hideClientForm();
                    loadClients();
                }
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        async function markAsPaid(invoiceId) {
            try {
                const response = await fetch(`/api/invoices/${invoiceId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: 'paid' })
                });

                if (response.ok) {
                    alert('✅ Facture marquée comme payée!');
                    loadInvoices();
                    loadAnalytics();
                }
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        function showInvoiceForm() {
            alert('Form à implémenter - pour l\'instant créer via API');
        }

        // Initialize
        init();
    </script>
</body>
</html>
